<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Whole Task Control for Codex</title>
  <desc id="desc">Keep long-running Codex tasks aligned across context compaction, corrections, resumed sessions, and multi-agent work.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="0.55" stop-color="#101a31"/>
      <stop offset="1" stop-color="#17102d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="0.5" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#7dd3fc" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#7dd3fc" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#93c5fd" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#020617" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1280" height="640" rx="28" fill="url(#background)"/>
  <rect width="1280" height="640" rx="28" fill="url(#grid)"/>
  <circle cx="1085" cy="126" r="310" fill="url(#glow)"/>
  <circle cx="1150" cy="560" r="250" fill="#8b5cf6" opacity="0.08"/>

  <g transform="translate(76 66)" filter="url(#shadow)">
    <rect width="104" height="104" rx="28" fill="#0f172a" stroke="url(#accent)" stroke-width="3"/>
    <path d="M27 31h50M27 52h35M27 73h27" fill="none" stroke="#94a3b8" stroke-width="6" stroke-linecap="round"/>
    <path d="m59 69 9 9 19-24" fill="none" stroke="url(#accent)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="204" y="108" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="27" font-weight="600" letter-spacing="1.2">OPENAI CODEX SKILL</text>
  <text x="204" y="148" fill="#7dd3fc" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="600" letter-spacing="2">BY QIUWEI | v2.1.1</text>

  <text x="76" y="270" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="78" font-weight="750" letter-spacing="-2">Whole Task Control</text>
  <text x="76" y="334" fill="url(#accent)" font-family="Segoe UI, Arial, sans-serif" font-size="54" font-weight="700">Keep Codex on track.</text>

  <text x="80" y="402" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="27" font-weight="400">Across context compaction, corrections, resumed sessions,</text>
  <text x="80" y="440" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="27" font-weight="400">and long-running multi-agent work.</text>

  <g transform="translate(80 510)" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600">
    <rect width="180" height="52" rx="26" fill="#132238" stroke="#2dd4bf" stroke-opacity="0.55"/>
    <text x="90" y="33" text-anchor="middle" fill="#99f6e4">Task continuity</text>
    <rect x="196" width="190" height="52" rx="26" fill="#132238" stroke="#60a5fa" stroke-opacity="0.55"/>
    <text x="291" y="33" text-anchor="middle" fill="#bfdbfe">Evidence tracking</text>
    <rect x="402" width="188" height="52" rx="26" fill="#132238" stroke="#a78bfa" stroke-opacity="0.55"/>
    <text x="496" y="33" text-anchor="middle" fill="#ddd6fe">Reliable resume</text>
  </g>

  <g transform="translate(996 210)" opacity="0.92">
    <path d="M0 0h155a28 28 0 0 1 28 28v198a28 28 0 0 1-28 28H0a28 28 0 0 1-28-28V28A28 28 0 0 1 0 0Z" fill="#0f172a" stroke="#334155" stroke-width="2"/>
    <circle cx="21" cy="52" r="10" fill="#2dd4bf"/>
    <rect x="45" y="43" width="104" height="18" rx="9" fill="#334155"/>
    <circle cx="21" cy="103" r="10" fill="#60a5fa"/>
    <rect x="45" y="94" width="83" height="18" rx="9" fill="#334155"/>
    <circle cx="21" cy="154" r="10" fill="#a78bfa"/>
    <rect x="45" y="145" width="116" height="18" rx="9" fill="#334155"/>
    <path d="m10 205 14 14 31-39" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="72" y="198" width="76" height="18" rx="9" fill="#334155"/>
  </g>
</svg>
